name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: cargo build --release

      - name: Rename exe
        run: |
          copy target\release\dartlab-desktop.exe DartLab.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: DartLab.exe
          generate_release_notes: true
